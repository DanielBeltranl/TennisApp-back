services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tennisapp}
      POSTGRES_USER: ${DB_USER:-tennisapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tennisapp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tennisapp} -d ${DB_NAME:-tennisapp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             daphne -b 0.0.0.0 -p 8000 back.asgi:application"

volumes:
  postgres_data:
